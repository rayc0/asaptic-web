name: Brand Firewall Sweep

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  firewall:
    name: Scan for forbidden tokens
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make sweep script executable
        run: chmod +x .github/scripts/firewall_sweep.sh

      - name: Run firewall sweep
        run: bash .github/scripts/firewall_sweep.sh .
