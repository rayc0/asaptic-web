  <script>
    // ─── Language Switching ───────────────────────────────────────────────────
    async function detectLang() {
      // Check localStorage first (user preference)
      const stored = localStorage.getItem('asaptic-lang');
      if (stored && ['en','zh','zht'].includes(stored)) return stored;

      // Try Cloudflare geo detection
      try {
        const res = await fetch('https://workers.asaptic.com/geo', { signal: AbortSignal.timeout(2000) });
        if (res.ok) {
          const { country } = await res.json();
          if (['HK','MO','TW'].includes(country)) return 'zht';
          if (country === 'CN') return 'zh';
          return 'en';
        }
      } catch {}

      // Fallback: browser language
      const lang = (navigator.language || '').toLowerCase();
      if (lang.startsWith('zh-tw') || lang.startsWith('zh-hk') || lang.startsWith('zh-mo')) return 'zht';
      if (lang.startsWith('zh')) return 'zh';
      return 'en';
    }

    function applyLang(lang) {
      if (!CONTENT[lang]) lang = 'en';
      const dict = CONTENT[lang];

      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if (dict[key] !== undefined) {
          el.textContent = dict[key];
        }
      });

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
      });

      document.documentElement.lang =
        lang === 'zht' ? 'zh-TW' : lang === 'zh' ? 'zh-CN' : 'en';

      localStorage.setItem('asaptic-lang', lang);
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        applyLang(btn.getAttribute('data-lang'));
      });
    });

    // ─── Blinking Cursor ──────────────────────────────────────────────────────
    const cursor = document.querySelector('.hero-cursor');
    if (cursor) {
      setInterval(() => {
        cursor.style.opacity = cursor.style.opacity === '0' ? '1' : '0';
      }, 530);
    }

    // ─── IntersectionObserver — fade-in + thread-rule ─────────────────────────
    const fadeObserver = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            fadeObserver.unobserve(entry.target);
          }
        });
      },
      { threshold: 0.15 }
    );

    document.querySelectorAll('.fade-in').forEach(el => fadeObserver.observe(el));

    const threadRule = document.querySelector('.thread-rule');
    if (threadRule) {
      const ruleObserver = new IntersectionObserver(
        (entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              threadRule.classList.add('visible');
              ruleObserver.unobserve(entry.target);
            }
          });
        },
        { threshold: 0.5 }
      );
      ruleObserver.observe(threadRule);
    }

    // ─── Init ─────────────────────────────────────────────────────────────────
    (async () => {
      const lang = await detectLang();
      applyLang(lang);
    })();
  </script>
